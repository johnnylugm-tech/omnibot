# SealedSecrets — secret values must be encrypted with kubeseal CLI:
#
#   echo -n 'actual-jwt-secret-value' | kubeseal --format yaml \
#     --cert pub-sealed-secrets.pem > omnibot-secrets.yaml
#
# The placeholder ciphertext below is for documentation only; replace
# with the kubeseal-encrypted output before applying to the cluster.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: omnibot-secrets
  namespace: omnibot
spec:
  encryptedData:
    jwt-secret: AgBxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    database-url: AgBxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    redis-url: AgBxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  template:
    metadata:
      name: omnibot-secrets
      namespace: omnibot
    type: Opaque