apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnibot-deployment
  labels:
    app: omnibot
    tier: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: omnibot
  template:
    metadata:
      labels:
        app: omnibot
        tier: api
    spec:
      containers:
        - name: omnibot-api
          image: omnibot/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: OMNIBOT_ENV
              value: production
            - name: OMNIBOT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: omnibot-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: omnibot-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: omnibot-secrets
                  key: redis-url
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi